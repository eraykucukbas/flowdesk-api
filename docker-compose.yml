# LOKAL

services:
  app:
    build:
      context: .
      target: development
    init: true
    ports:
      - '3000:3000'
      - '9229:9229'
    volumes:
      - ./src:/app/src 
      - ./test:/app/test
      - /app/node_modules
    env_file:
      - .env
    environment:
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432' 
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowdesk
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d flowdesk']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata: